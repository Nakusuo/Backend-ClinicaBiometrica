version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: telemedicina_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: telemedicina
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: telemedicina_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:admin@db:5432/telemedicina
      - SECRET_KEY=telemedicina2026
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  postgres_data:
